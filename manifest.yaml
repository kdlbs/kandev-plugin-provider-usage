id: "kandev-provider-usage"
api_version: 1
version: "0.2.6"
display_name: "Provider Usage"
description: "Subscription utilization for your agent providers — how much of each rate-limit window (5-hour / weekly / monthly) is used, with reset times. Hover the gauge in the session top bar to cycle through every provider, starting with the current session's. Data comes from the codexbar CLI (plus Augment's Analytics API)."
author: "kandev"
categories: ["analytics"]
repo_url: "https://github.com/kdlbs/kandev-plugin-provider-usage"

runtime:
  type: binary
  executables:
    linux-amd64: "server/plugin-linux-amd64"
    linux-arm64: "server/plugin-linux-arm64"
    darwin-amd64: "server/plugin-darwin-amd64"
    darwin-arm64: "server/plugin-darwin-arm64"
    windows-amd64: "server/plugin-windows-amd64.exe"

# Read-only access to kandev sessions so the backend can map the composer's
# kandev session id to the agent it runs, and from there to a codexbar provider
# (claude / codex / gemini / ...). The UI only ever sends kandev ids; the
# session -> provider resolution happens server-side.
capabilities:
  api_read: ["sessions"]

webhooks:
  - key: "status"
    description: "codexbar CLI install status: resolved command, source, version (GET; ?refresh=1 re-probes)"
    method: "GET"
  - key: "providers"
    description: "Subscription utilization for every configured provider as JSON (GET; ?refresh=1 bypasses the cache)"
    method: "GET"
  - key: "session"
    description: "Subscription utilization for the current session's provider (GET; ?task_id=&active=&refresh=1)"
    method: "GET"
  - key: "overview"
    description: "All providers plus the current session's provider, for the chat-top-bar panel (GET; ?task_id=&active=&refresh=1)"
    method: "GET"

ui:
  bundle: "/ui/bundle.js"

# Operator settings (Settings > Plugins > Provider Usage). Read through the Host
# GetConfig RPC on every webhook call; kandev restarts the plugin whenever the
# operator saves, so changes take effect immediately.
config_schema:
  type: object
  # Fields render grouped by their key prefix: augment_ · codexbar_ · display_.
  properties:
    # ── Augment (optional) ────────────────────────────────────────────────
    augment_api_token:
      type: string
      format: password
      secret: true
      title: "Augment · API token"
      description: >-
        Augment Analytics service-account token. Create one at
        https://app.augmentcode.com/settings/personal-api-tokens. With the email
        below, adds an Augment card + pill entry showing monthly consumption via
        Augment's Analytics API. Stored as a secret.
    augment_email:
      type: string
      title: "Augment · Account email"
      description: "Your Augment org email, used to filter Analytics to your usage."
    augment_monthly_budget:
      type: number
      title: "Augment · Monthly budget (max)"
      description: >-
        Budget for the used-of-budget %. Precedence: this value → a per-user
        Analytics budget override → a 2,500,000-credit default (credit plans).
    augment_resource:
      type: string
      enum: ["credits", "usd"]
      default: "credits"
      title: "Augment · Plan unit"
      description: "Whether your Augment plan is billed in credits or USD."

    # ── codexbar (data source) ────────────────────────────────────────────
    codexbar_command:
      type: string
      title: "codexbar · CLI command"
      description: >-
        Path to the codexbar CLI. Empty = auto-detect (PATH, else a pinned
        per-platform binary is downloaded once, SHA-256 verified). Windows has no
        codexbar build — set a path there.
    codexbar_poll_minutes:
      type: number
      default: 5
      title: "codexbar · Refresh interval (min)"
      description: "How often usage refreshes in the background. Default 5, minimum 1."
    codexbar_providers:
      type: string
      title: "codexbar · Providers to poll"
      description: >-
        Comma-separated provider ids to poll, e.g. "claude,codex,gemini". Empty =
        a curated local-credential set; "all" = every provider (much slower).

    # ── Display ───────────────────────────────────────────────────────────
    display_pill_providers:
      type: string
      title: "Display · Top-bar pill"
      description: >-
        Providers shown in the top-bar pill (icon + %), comma-separated. Tokens:
        "current" (this session's provider), "all", or explicit ids. Empty =
        current only.
    display_status_bar_mode:
      type: string
      enum: ["off", "percentage", "meter", "both"]
      default: "off"
      title: "Display · Global status bar"
      description: >-
        Status-bar presentation. "off" keeps provider usage in the session
        top bar only; "percentage" shows the provider percentage; "meter" shows
        the usage meter without a percentage; "both" shows meter and percentage.
        Enabled modes also add readable rows to the phone Status drawer.
    display_threshold_warn:
      type: number
      default: 75
      title: "Display · Warn threshold (%)"
      description: "A window at or above this turns amber. Default 75."
    display_threshold_high:
      type: number
      default: 90
      title: "Display · High threshold (%)"
      description: "A window at or above this turns red. Default 90."
